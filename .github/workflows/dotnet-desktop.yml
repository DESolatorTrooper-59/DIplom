name: Build WPF App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      PROJECT_PATH: WPF/Tournaments.WPF.csproj
      BUILD_CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore WPF project
        run: msbuild $env:PROJECT_PATH /t:Restore /p:Configuration="$env:BUILD_CONFIGURATION"

      - name: Build WPF project
        run: msbuild $env:PROJECT_PATH /t:Build /p:Configuration="$env:BUILD_CONFIGURATION" /m

      - name: Upload WPF artifact
        uses: actions/upload-artifact@v4
        with:
          name: tournaments-wpf-release
          path: |
            WPF/bin/Release/net48/**
          if-no-files-found: error
